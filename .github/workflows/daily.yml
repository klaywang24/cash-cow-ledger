name: daily index

# Compute and record the index level after each trading day's close; additionally review
# constituents on the first trading day of January and July.
# Commit types are strictly separated: this workflow only produces `data:` commits and
# never touches the rule files.
on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC, shortly after the US close (Mon-Fri)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install --quiet requests pyyaml pandas yfinance

      # Inception (and the January/July reviews) must run the screen and portfolio build first.
      # open_books is idempotent: it exits immediately if already open or before inception.
      - name: screen + build (only needed at inception / reconstitution)
        run: |
          if [ ! -f data/ledger/constituents.csv ]; then
            python -m src.run_screen
            python -m src.build_portfolio
          fi

      - name: open books (one-time, idempotent)
        run: python -m src.open_books

      # Semi-annual reconstitution: reconstitute decides for itself whether this is a review
      # month and whether it already ran, exiting immediately otherwise. A review needs the
      # latest ranking, so the screen runs first.
      - name: reconstitute (Jan / Jul only, self-gating)
        run: |
          if [ -f data/ledger/constituents.csv ]; then
            MONTH=$(date -u +%m)
            if [ "$MONTH" = "01" ] || [ "$MONTH" = "07" ]; then
              python -m src.run_screen
              python -m src.build_portfolio
            fi
            python -m src.reconstitute
          fi

      - name: compute index level
        run: python -m src.daily_level

      # Stdlib-only and deterministic: an unchanged ledger produces a byte-identical SVG,
      # so this step never creates a commit on its own.
      - name: render README chart
        run: python -m src.render_chart

      - name: commit data
        run: |
          # Commit as the repository owner: a bot identity would appear as a separate
          # contributor and, using a plus-alias, would not map to the account at all.
          git config user.name  "Klay"
          git config user.email "klaywang24@gmail.com"
          git add data/ledger/ output/ || true
          if git diff --staged --quiet; then
            echo "no change"; exit 0
          fi
          git commit -m "data: daily index level $(date -u +%F)"
          git push

      # Third-party timestamp anchor. Wayback is routinely flaky; no failure may affect the pipeline.
      - name: anchor to Wayback
        continue-on-error: true
        run: |
          REPO="${GITHUB_REPOSITORY}"
          for u in \
            "https://github.com/${REPO}" \
            "https://github.com/${REPO}/blob/main/METHODOLOGY.md" \
            "https://github.com/${REPO}/blob/main/config.yaml" \
            "https://github.com/${REPO}/commits/main"
          do
            curl -sS -m 60 "https://web.archive.org/save/$u" -o /dev/null || true
            sleep 5
          done
