name: daily index

# 每个交易日收盘后计算指数点位并落库；每年1月/7月首个交易日另做成分审查。
# 提交类型严格分离：本工作流只产生 `data:` 提交，绝不改动规则文件。
on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC ≈ 美东收盘后（周一至周五）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: pip install --quiet requests pyyaml pandas yfinance

      # 开账日（及每年1月/7月首个交易日的审查）需要先跑筛选与成分构建。
      # open_books 自身幂等：已开账或未到开账日都会立即退出。
      - name: screen + build (only needed at inception / reconstitution)
        run: |
          if [ ! -f data/ledger/constituents.csv ]; then
            python -m src.run_screen
            python -m src.build_portfolio
          fi

      - name: open books (one-time, idempotent)
        run: python -m src.open_books

      - name: compute index level
        run: python -m src.daily_level

      - name: commit data
        run: |
          git config user.name  "cash-cow-ledger-bot"
          git config user.email "klaywang24+cashcowledger@gmail.com"
          git add data/ledger/ output/ || true
          if git diff --staged --quiet; then
            echo "no change"; exit 0
          fi
          git commit -m "data: daily index level $(date -u +%F)"
          git push

      # 第三方时间戳锚：Wayback 不稳定属常态，任何失败都不许影响管线。
      - name: anchor to Wayback
        continue-on-error: true
        run: |
          REPO="${GITHUB_REPOSITORY}"
          for u in \
            "https://github.com/${REPO}" \
            "https://github.com/${REPO}/blob/main/METHODOLOGY.md" \
            "https://github.com/${REPO}/blob/main/config.yaml" \
            "https://github.com/${REPO}/commits/main"
          do
            curl -sS -m 60 "https://web.archive.org/save/$u" -o /dev/null || true
            sleep 5
          done
