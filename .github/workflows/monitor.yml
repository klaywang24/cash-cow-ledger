name: freshness monitor

# Guards against silent pipeline death. If daily.yml errors outright, GitHub sends its own
# failure email; but it can also REPORT SUCCESS WHILE PRODUCING NO DATA — and in that state
# every green light is false.
# This workflow independently reads the latest date in the ledger data itself and fails with
# a non-zero exit code when stale, triggering GitHub's native failure notification by email
# rather than posting to a channel nobody reads.
#
# NOTE: this workflow never uses constructs like `if: always()` that would mask a failure —
#       a monitor that raises false all-clears is more dangerous than no monitor at all.
on:
  schedule:
    - cron: "0 13 * * *"     # 13:00 UTC daily (~09:00 US Eastern, before the day's update, so
                             # it checks the state as of the previous close)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pyyaml
      - name: check ledger freshness
        run: python -m src.check_freshness
