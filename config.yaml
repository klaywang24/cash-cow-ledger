# =====================================================================
#  Cash Cow Ledger — parameters
#  Every screening parameter lives here; thresholds are never hard-coded.
#  Changing a rule means changing this file, not the code.
#  This file is the executable copy of METHODOLOGY.md — if the two conflict,
#  the methodology governs and this file must be corrected.
# =====================================================================

meta:
  index_name: "Cash Cow Ledger"
  index_name_zh: "现金牛台账"
  # The product is a FORWARD-TRACKED PAPER INDEX, not a backtest.
  # Any backtest is reference only and must be labeled with look-ahead
  # and survivorship bias warnings.
  inception_date: "2026-07-20"  # Inception (Monday). After this, everything enters
                                # the record; rule changes require versioned commits.
  base_currency: "USD"

# ---- SEC EDGAR: primary source for US fundamentals (live, full XBRL history from ~2009) ----
edgar:
  # The SEC requires a User-Agent with a real contact, or requests get throttled/blocked.
  user_agent: "Cash Cow Ledger research (klaywang24+cashcowledger@gmail.com)"
  rate_limit_per_sec: 8         # SEC caps at 10/s; leave headroom
  cache_dir: "data/fundamentals_cache"
  cache_days: 7                 # local companyfacts cache lifetime (days)

# ---- L1 universe ----
L1_universe:
  source: "sp500"               # S&P 500 to start; widening to russell1000 is a one-line change
  min_market_cap_usd: 2.0e9     # market-cap floor
  # The FCF / gross-margin / ROIC framework is meaningless for balance-sheet financials
  # (banks, insurers, consumer finance) and for REITs, so they are dropped at L1.
  # Asset-light financials (payment networks, exchanges and data vendors) do have real
  # margins and free cash flow, and are kept.
  exclude_sectors: ["Real Estate"]
  keep_financials_sub: ["Transaction & Payment Processing Services",
                        "Financial Exchanges & Data"]

# ---- L2 landmine exclusions (any single hit removes the name) ----
L2_landmines:
  # Net income / operating cash flow above threshold for N consecutive years
  # (earnings far exceeding cash = questionable earnings quality)
  ni_to_ocf_ratio_max: 1.3
  ni_to_ocf_consecutive_years: 3
  # Receivables growth exceeding revenue growth by this multiple, N years running
  ar_vs_rev_growth_multiple: 2.0
  ar_vs_rev_consecutive_years: 2
  # Net share count rising rather than falling over N years despite buybacks
  # (buybacks swallowed by stock-based compensation)
  net_share_lookback_years: 3
  # Net debt / EBITDA ceiling
  net_debt_to_ebitda_max: 3.0

# ---- L3 quality inclusion (all must be satisfied) ----
L3_quality:
  fcf_positive_years: 7         # consecutive years of positive FCF — the single most important parameter
  fcf_cv_max: 0.60              # FCF coefficient of variation ceiling; filters cyclical-peak fake cash cows
  gross_margin_min: 0.30        # gross-margin floor
  gross_margin_trend_years: 10  # gross margin must not decline over N years
  # When no gross-margin concept exists (payment networks have no COGS), fall back to
  # operating margin — this avoids a measurement false-negative on genuine quality names.
  operating_margin_min_fallback: 0.20
  roic_min: 0.12                # floor on M-year average ROIC
  roic_lookback_years: 5
  asset_growth_le_revenue_years: 3   # asset growth ≤ revenue growth over N years (capital discipline)

# ---- L4 valuation constraint (either one suffices) ----
L4_valuation:
  fcf_yield_min_vs_ust10y: true # FCF yield ≥ 10-year US Treasury yield
  ust10y_fallback: 0.045        # fallback when the live Treasury yield is unavailable
  pe_max: 30                    # or trailing P/E ≤ this ceiling

# ---- L5 count ----
L5_count:
  target_holdings: 20           # Constituent count N. Why 20: diversification benefits saturate
                                # between 15 and 25; a mechanical screen has low information
                                # coefficient per name, so by IR ≈ IC × √breadth it should not be
                                # concentrated; but sector concentration caps effective breadth
                                # near 25. The two forces cross at 20-25.
  min_holdings: 15              # below this, record the anomaly (do not backfill, do not relax rules)
  score_weights:                # composite score weights (used for ranking and for weighting)
    fcf_yield: 0.30
    roic: 0.25
    gross_margin: 0.20
    fcf_stability: 0.15         # = 1 − normalized coefficient of variation
    low_asset_growth: 0.10

# ---- Reconstitution and weighting (Book One is 100% mechanical: no human confirmation step) ----
rules:
  # Rank buffer (hysteresis): entrants need rank ≤ N; incumbents leave only past rank 2N.
  # Absolute ranks rather than percentiles — with only twenty-odd qualifiers, "top 20%"
  # degenerates to four or five names.
  buffer_enter_rank: 20         # = N
  buffer_exit_rank: 40          # = 2N
  momentum_veto_ma_days: 200    # entrants must be above the 200d MA; incumbents due for removal
                                # but still above it are deferred one review period
  weighting: "score"            # composite-score weighted (not absolute FCF: that skews toward
                                # large, mature cash cows)
  entry_weight_cap: 0.08        # capped at entry only
  rebalance_after_entry: false  # never rebalanced afterwards; winners are allowed to drift up
                                # (the S&P's "momentum of not selling")
  review_months: [1, 7]         # first trading day of January and July; constituents fixed otherwise
  turnover_budget_annual: 0.25  # turnover above this records an alert only — it changes no rule
  # NOTE: the exception clause was deliberately removed. Book One must stay 100% mechanical and
  # reproducible: any discretion (including a "confirm this change" step) would make it
  # unauditable and unlicensable. Discretionary holdings never enter this index.

# ---- Benchmarks (used from Phase 2) ----
benchmarks:
  primary: "SPY"                # the yardstick: cap-weighted, zero-cost momentum
  reference: ["QQQ"]            # reference line only — not a pass/fail judge (survivorship bias)
  peer_products: ["COWZ", "QUAL"]   # peer factor products: does this add anything beyond the shelf?

# ---- Pipeline monitoring (guards against silent death) ----
monitoring:
  # Alert if the ledger's latest row is older than this many days. Weekends and holidays
  # included, hence the 4-day allowance.
  # NOTE: the test is the FRESHNESS OF THE LEDGER DATA ITSELF, not any workflow's self-report —
  #       a workflow reporting "success" while producing nothing is the classic silent death.
  max_stale_days: 4

# ---- Missing-data policy (hard constraint) ----
data_policy:
  # Missing financials are flagged explicitly; silent filling or skipping is forbidden.
  # Any missing required field marks the name data_incomplete, excludes it from scoring,
  # and lists it separately.
  on_missing: "flag_exclude"
